# Project configuration
# Copy config.yaml.example to config.yaml and edit paths/settings for your environment.

max_length: 1536

paths:
  # Hugging Face cache directory
  cache_dir: "./.cache/models"

  # Dataset roots
  train_data_root: "./dataset"
  eval_data_root: "./dataset"

  # Output directories
  tuned_dir: "./tuned"
  log_dir: "./exp_result"

# Logical training types used by prompt/data code.
# Expected training data path:
#   ${paths.train_data_root}/${train_type_dirs[train_type]}/${data_name}/{train,val}.jsonl
train_type_dirs:
  ours: "ours_data"
  origin_training_data: "origin_training_data"

# Evaluation files are resolved as:
#   ${paths.eval_data_root}/${eval_data_files[data_name]}
eval_data_files:
  act2: "origin_data/act2/act2_test.tsv"
  acl_arc: "origin_data/acl_arc/acl_arc_test.txt"
  scicite: "origin_data/scicite/test.txt"

experiment:
  model: "qwen3"
  data_name: "act2"
  train_type: "ours"
  epochs: 10
  seed: 42
  run_id: "427"

training:
  loss: "ce_focal"
  focal_gamma: 1.5

  lambda_span: 0.7
  lambda_cls: 0.8
  lambda_label: 1.0
  lambda_format: 0.1

  learning_rate: 1.0e-4
  warmup_ratio: 0.05
  weight_decay: 0.01
  max_grad_norm: 1.0
  lr_scheduler_type: "cosine"
  optim: "adamw_torch"
  save_total_limit: 20
  logging_steps: 200
  eval_strategy: "steps"
  eval_steps: 200
  save_strategy: "epoch"
  stop_step: 0

  bf16: false
  attn_implementation: "flash_attention_2"
  gradient_checkpointing: false

  lora_r: 32
  lora_alpha: 64
  lora_dropout: 0.05

  use_class_weight: true
  cls_fusion: "global_local"
  cls_dropout: 0.10
  cls_label_smoothing: 0.05

  span_loss_control: "winsor"
  span_loss_quantile: 0.90
  span_loss_cap: 5.0
  span_robust_mode: "none"
  span_sample_loss_cap: 0.0
  span_sample_drop_threshold: 0.0
  span_sample_soft_temperature: 1.0

  debug_tokenization: false
  debug_n_samples: 3

eval:
  lora: "true"
  max_new_tokens: 160
  bin_size: 1000
  attn_implementation: null
  # Optional. If empty, evaluation derives the final LoRA directory from experiment/training settings.
  llama_lora_dir: ""
  # Optional. If empty, model_type defaults to experiment.model.
  model_type: null
